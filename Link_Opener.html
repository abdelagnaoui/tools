<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #e6f0ff;
    margin: 0;
    padding: 20px;
}

/* PANEL */
.container {
    background: #fff;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* GRID */
#framesContainer {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 15px;
    margin-top: 30px;
}

/* CARD */
.frameBox {
    background: #fff;
    border: 2px solid red;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 220px;
    border: none;
}

/* FALLBACK */
.fallback {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 14px;
    color: #333;
    display: none;
}

.fallback button {
    width: auto;
    padding: 6px 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h3>Enter Links</h3>

    <textarea id="linksTextBox" rows="6"></textarea>

    <button onclick="processLinks()">Load Links</button>
    <button onclick="clearLinks()">Clear</button>
</div>

<div id="framesContainer"></div>

<script>
const textarea = document.getElementById("linksTextBox");
const container = document.getElementById("framesContainer");

/* LOAD SAVED */
window.onload = () => {
    const saved = localStorage.getItem("links");
    if(saved){
        textarea.value = saved;
        loadLinks(saved.split("\n"));
    }
};

/* PROCESS */
function processLinks(){
    let links = textarea.value
        .split("\n")
        .map(l => l.trim())
        .filter(l => l);

    // add https automatically
    links = links.map(l => l.startsWith("http") ? l : "https://" + l);

    localStorage.setItem("links", links.join("\n"));

    loadLinks(links);
}

/* LOAD */
function loadLinks(links){
    container.innerHTML = "";

    links.forEach(link => {

        const box = document.createElement("div");
        box.className = "frameBox";

        const iframe = document.createElement("iframe");
        iframe.src = link;

        const fallback = document.createElement("div");
        fallback.className = "fallback";

        const txt = document.createElement("div");
        txt.innerText = "🚫 Blocked by site";

        const btn = document.createElement("button");
        btn.innerText = "Open Link";
        btn.onclick = () => window.open(link, "_blank");

        fallback.appendChild(txt);
        fallback.appendChild(btn);

        box.appendChild(iframe);
        box.appendChild(fallback);
        container.appendChild(box);

        /* DETECT BLOCK */
        setTimeout(() => {
            try {
                iframe.contentWindow.location.href;
            } catch {
                fallback.style.display = "flex";
            }
        }, 1500);
    });
}

/* CLEAR */
function clearLinks(){
    localStorage.removeItem("links");
    container.innerHTML = "";
    textarea.value = "";
}
</script>

</body>
</html>
