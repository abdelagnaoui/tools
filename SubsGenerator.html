<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Subdomain Generator</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

input {
    padding: 10px;
    width: 80%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #22c55e;
    color: white;
}

.item {
    background: #020617;
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Subdomains Generator</h2>

<input type="number" id="count" value="10"><br>

<button onclick="generate()">Generate</button>

<div id="results"></div>

</div>

<script>
 
let used = JSON.parse(localStorage.getItem("ALL_SUBS")) || [];

// words--
const base = [
"autonomy","cognition","inference","model","agent","reasoning","synthesis","abstraction","learning","training","finetune","embedding","transformer","attention","diffusion",
"classifier","regression","labeling","dataset","feature","vectorization","hyperparameter","evaluation","benchmark","microservice","container","virtualization","orchestration","serverless","function",
"api","endpoint","webhook","sdk","library","framework","plugin","extension","module","package",
"repository","registry","build","deploy","release","version","commit","branch","merge","diff",
"patch","review","testing","unit","integration","e2e","staging","production","sandbox",
"encryption","decryption","hashing","indexing","search","ranking","recommendation","analytics","telemetry","observability",
"logging","tracing","event","streaming","batch","realtime","latency","throughput",
"scalability","resilience","redundancy","failover","backup","restore","compliance","governance","policy",
"identity","access","authentication","authorization","session","token","automation","devops","mlops",
"aiops","simulation","digitaltwin","workflow","jobscheduling","autonomy","cognition","inference","model",
"agent","reasoning","synthesis","abstraction","learning","training","finetune","embedding","transformer","attention","diffusion","classifier","regression","labeling","dataset","feature",
"simulation","digitaltwin","workflow","jobscheduling"

];

//  doms
const domainNames = [
"cloudcore","cloudforge","cloudpulse","cloudgrid","cloudstack","cloudhub","cloudnode","cloudvault","cloudbridge","cloudstream",
"techflow","techcore","techgrid","techvault","techpulse","techhub","techforge","techstack","techbridge","techstream",
"datapulse","datacore","datagrid","datavault","datastream","databridge","datalab","datanode","datasync","datamind",
"webstack","webcore","webflow","webgrid","webvault","webhub","webforge","webpulse","weblink","webnode",
"netcraft","netcore","netgrid","netflow","netvault","nethub","netnode","netbridge","netpulse","netstack",
"devpoint","devcore","devgrid","devflow","devvault","devhub","devstack","devbridge","devpulse","devlab",
"aicore","aihub","aigrid","aivault","aipulse","aiforge","aistream","ainode","aibridge","aistack",
"cybercore","cyberhub","cybervault","cybergrid","cyberpulse","cyberforge","cyberlink","cybernode","cyberbridge","cyberstack",
"classroom","examoffice","virtualcourt","newspulse","newsgrid","newscore","reviewhub","reviewstack","reviewpulse","academycore",
"skillforge","learnhub","studycore","codeforge","logiclane","neuralnest","systembridge","pixelshift","quantalab",
"hostzone","cloudcore","baracademy","webstack","datapulse","nextgrid","hostzone","netcraft",
"skyhub","devpoint","barnews","barreview","classroom","examoffice","virtualcourt"

];

// extensions
const tlds = [
".com",".net",".org"
];

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

    let count = parseInt(document.getElementById("count").value);
    let results = document.getElementById("results");

    results.innerHTML = "";

    let newList = [];
    let tries = 0;

    while(newList.length < count && tries < 10000){

        let name = rand(base) + "-" + rand(base);

        if(Math.random() > 0.5){
            name += "-" + rand(base);
        }

        let domain = rand(domainNames) + rand(tlds);
        let full = name + "." + domain;

        //  duplicate
        if(!used.includes(full)){
            used.push(full);
            newList.push(full);
        }

        tries++;
    }

    localStorage.setItem("ALL_SUBS", JSON.stringify(used));

    newList.forEach(d=>{
        let div = document.createElement("div");
        div.className = "item";
        div.textContent = d;
        results.appendChild(div);
    });
}

 

</script>

</body>
</html>
