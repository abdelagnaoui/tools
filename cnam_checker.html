<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Scanner</title>

<style>
body { 
  font-family: Arial; 
  padding: 30px; 
  background: #0f172a;
  color: white;
}

textarea { 
  padding: 10px; 
  width: 320px; 
  height: 120px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button { 
  padding: 10px 15px; 
  cursor: pointer; 
  margin-top: 10px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 6px;
}

pre {
  background: #020617;
  padding: 15px;
  margin-top: 20px;
  height: 400px;
  overflow: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🌐 Wildcard + Subdomain CNAME Scanner</h2>

<textarea id="domainInput" placeholder="wix&#10;google&#10;shop"></textarea><br>
<button onclick="start()">Scan</button>

<pre id="result">Ready...</pre>

<script>

const tlds = ["com","net","org","io","ma","xyz","ai","de"];
const subs = ["www","api","mail","blog","cdn"];

// DNS check
async function check(domain) {
  try {
    const res = await fetch(
      `https://cloudflare-dns.com/dns-query?name=${domain}&type=CNAME`,
      { headers: { "accept": "application/dns-json" } }
    );
    return await res.json();
  } catch {
    return null;
  }
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function start() {
  const input = document.getElementById("domainInput").value;
  const result = document.getElementById("result");

  // split multiline / comma / space
  let keywords = input.split(/\n|,|\s/);

  // clean + remove empty + duplicates
  keywords = [...new Set(keywords.map(k => k.trim()).filter(k => k))];

  if (keywords.length === 0) {
    result.textContent = "⚠️ enter at least one keyword";
    return;
  }

  result.textContent = "⏳ scanning...\n\n";

  let found = [];

  for (let keyword of keywords) {

    result.textContent += `\n🔎 scanning: ${keyword}\n`;

    for (let tld of tlds) {

      const root = `${keyword}.${tld}`;

      // check root
      const rootData = await check(root);
      if (rootData && rootData.Answer) {
        const cname = rootData.Answer.find(r => r.type === 5);
        if (cname) {
          const line = `✅ ${root} → ${cname.data}`;
          found.push(line);
          result.textContent = found.join("\n");
        }
      }

      // check subdomains
      for (let s of subs) {
        const full = `${s}.${root}`;
        const data = await check(full);

        if (data && data.Answer) {
          const cname = data.Answer.find(r => r.type === 5);

          if (cname && cname.data) {
            const line = `✅ ${full} → ${cname.data}`;
            found.push(line);
            result.textContent = found.join("\n");
          }
        }

        await sleep(100);
      }
    }
  }

  if (found.length === 0) {
    result.textContent = "❌ No CNAME found";
  } else {
    result.textContent += "\n\n🎯 Done";
  }
}

</script>

</body>
</html>
