<head>
<meta charset="UTF-8">
<title>Boit GMAIL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;
}

.container{
  display:flex;
  height:100vh;
}

.left{
  width:320px;
  background:rgba(255,255,255,0.05);
  padding:20px;
}

.create{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#6366f1;
  color:white;
  font-weight:600;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete{
  cursor:pointer;
  color:#f87171;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.page-title{
  font-size:28px;
  font-weight:600;
  margin-top:10px;
}

.center{
  text-align:center;
}

.email{
  font-size:22px;
  font-weight:600;
  margin-bottom:15px;
}

.copy-btn{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.footer{
  font-size:13px;
  opacity:0.6;
  margin-bottom:10px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#6366f1;
  padding:10px;
  border-radius:10px;
  opacity:0;
}
.toast.show{
  opacity:1;
}
</style>
</head>

<body>

let active = [];
let selected = null;

// ⏳ 30min
function isExpired(time){
  return (Date.now() - time) > (30 * 60 * 1000);
}

// 🔀 shuffle
function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// GENERATE
function generateEmail(){
  let used = JSON.parse(localStorage.getItem("usedMails") || "{}");

  if(active.length >= 5){
    showToast("Limit reached ❌");
    return;
  }

  let shuffled = shuffle([...pool]);

  let email = shuffled.find(mail => {
    if(!used[mail]) return true;
    return isExpired(used[mail]);
  });

  if(!email){
    showToast("Wait 30min ⏳");
    return;
  }

  active.push(email);
  selected = email;

  used[email] = Date.now();
  localStorage.setItem("usedMails", JSON.stringify(used));

  render();
}

// RENDER
function render(){
  let used = JSON.parse(localStorage.getItem("usedMails") || "{}");

  for(let mail in used){
    if(isExpired(used[mail])){
      delete used[mail];
    }
  }

  localStorage.setItem("usedMails", JSON.stringify(used));

  let list = document.getElementById("list");
  list.innerHTML = "";

  active.forEach((mail, i) => {
    list.innerHTML += `
      <div class="card">
        <span onclick="selectEmail('${mail}')">${mail}</span>
        <span class="delete" onclick="deleteMail(${i})">🗑</span>
      </div>
    `;
  });

  document.getElementById("selectedEmail").innerText = selected || "No email";
}

// SELECT
function selectEmail(mail){
  selected = mail;
  render();
}

// COPY
function copySelected(){
  if(!selected) return;
  navigator.clipboard.writeText(selected);
  showToast("Copied!");
}

// DELETE
function deleteMail(index){
  active.splice(index,1);
  render();
}

// TOAST
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=> t.classList.remove("show"),2000);
}
</script>
